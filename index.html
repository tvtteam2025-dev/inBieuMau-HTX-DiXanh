<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hệ thống In ấn Biểu mẫu</title>
    <link rel="stylesheet" href="styles.css">
    <!-- html2pdf.js để xuất PDF chụp màn hình (nếu cần) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

    <!-- Bộ thư viện Nhồi dữ liệu Word (Docxtemplater) -->
    <script src="https://cdn.jsdelivr.net/npm/pizzip@3.1.7/dist/pizzip.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/docxtemplater@3.40.2/build/docxtemplater.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/file-saver@2.0.5/dist/FileSaver.min.js"></script>

    <!-- Bộ thư viện Vẽ màn hình Word (Docx-Preview) -->
    <script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/docx-preview@0.3.3/dist/docx-preview.min.js"></script>
</head>

<body>
    <div class="app-container">
        <!-- Sidebar Trái -->
        <aside class="sidebar no-print">
            <h2 class="app-title">In ấn biểu mẫu - Hợp tác xã</h2>

            <div class="control-group">
                <label>Template hiện tại:</label>
                <select id="template-select" class="form-control">
                    <option value="bia">Bìa</option>
                    <option value="bien_ban_thanh_ly">Biên bản thanh lý </option>
                    <option value="cong_ty_hop_dong_dich_vu">Công ty - HĐ Dịch vụ</option>
                    <option value="cong_ty_xac_nhan_xa_vien">Công ty - Xác nhận xã viên</option>
                    <option value="giay_de_nghi">Giấy đề nghị</option>
                    <option value="giay_hen_tra_phu_hieu">Giấy hẹn trả phù hiệu</option>
                    <option value="hop_dong_dich_vu">Hợp đồng dịch vụ</option>
                    <option value="hop_dong_lao_dong">Hợp đồng lao động</option>
                    <option value="lenh_van_chuyen_tai_cont">Lệnh vận chuyển - Cont - Tải (A5)</option>
                    <option value="lenh_van_chuyen_xe_hop_dong">Lệnh vận chuyển - Xe - HĐ (A5)</option>
                    <option value="xac_nhan_xa_vien">Xác nhận xã viên</option>
                </select>
            </div>

            <div class="control-group">
                <label>ID Dữ liệu:</label>
                <input type="text" id="record-id" class="form-control" placeholder="Nhập ID hợp đồng..." readonly>
            </div>

            <div class="action-buttons">
                <button id="btn-reload" class="btn btn-primary">Tải lại Dữ liệu</button>
                <button id="btn-word" class="btn btn-word-full">Xuất Word</button>
            </div>

            <div id="status-message" class="status-message"></div>

            <div class="data-inspector">
                <h3>Dữ liệu</h3>
                <div id="data-preview" class="json-preview">Đang chờ dữ liệu...</div>
            </div>
        </aside>

        <!-- Main Content (Khung hiển thị bản in) -->
        <main class="main-content">
            <div id="document-preview-container" class="preview-container">
                <!-- docx-preview sẽ render các trang A4 vào đây -->
                <div id="document-content">
                    Vui lòng cung cấp tham số URL hợp lệ (ví dụ: ?template=bia&id=123)
                </div>
            </div>
        </main>
    </div>

    <script src="js/utils.js"></script>
    <script src="js/api.js"></script>
    <script src="js/template-engine.js"></script>
    <script src="js/export-pdf.js"></script>
    <script src="js/export-word.js"></script>
    <script src="js/app.js"></script>

    <!-- Login Modal -->
    <div id="login-modal" class="modal-overlay" style="display: none;">
        <div class="modal-content">
            <h3 style="margin-bottom: 15px; text-align: center;">Đăng Nhập Hệ Thống</h3>
            <div class="control-group">
                <input type="text" id="login-username" class="form-control" placeholder="Tên đăng nhập">
            </div>
            <div class="control-group" style="margin-top: 10px;">
                <input type="password" id="login-password" class="form-control" placeholder="Mật khẩu">
            </div>
            <button id="btn-login" class="btn btn-primary" style="margin-top: 15px; width: 100%;">Đăng Nhập</button>
            <div id="login-error" class="status-message error" style="margin-top: 10px; display: none;"></div>
        </div>
    </div>
</body>

</html>
